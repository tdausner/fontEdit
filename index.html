<html>
    <head>
        <title>fontEdit</title>
        <link rel="stylesheet" href="app/style.css" />
    </head>
    <body>
        <main>
            <div class="params">
                <div class="buttonGroup">
                    <button class="fileUpload" onclick="document.getElementById('fileUpload').click()"
                        title="load bitmaps from file"></button>
                    <input type="file" id="fileUpload" class="fileUpload" />
                </div>

                <select class="displaySize">
                    <option value="4">32 x 128 max display size</option>
                    <option value="8">64 x 128 max display size</option>
                </select>

                <div class="buttonGroup">
                    <input class="areaCopy" type="checkbox" id="areaCopy" name="areaCopy" />
                    <label class="areaCopy" for="areaCopy">area copy</label>
                </div>

                <div class="buttonGroup rowButtons">
                    <button class="addRow" title="add a row"></button>
                    <button class="removeRow" title="remove a row"></button>
                    <fieldset>
                        <input class="where" type="radio" id="top" name="where" value="top" checked />
                        <label class="where" for="top">at top</label>
                        <input class="where" type="radio" id="bottom" name="where" value="bottom" />
                        <label class="where" for="bottom">at bottom</label>
                    </fieldset>
                    <span class="maxRows"></span>
                </div>

            </div>

            <div class="canvasAndResult">
                <div class="canvas"></div>

                <div class="buttonGroup">
                    <button class="make" title="make bitmap output"></button>
                    <button class="copy" title="copy to clipboard"></button>
                </div>
                <pre></pre>
            </div>

            <script type="module" src="app/index.js"></script>
        </main>
    </body>
</html>
